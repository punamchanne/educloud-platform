    <!-- Open Graph / Facebook -->

    <meta property="og:url" content="https://educloud.app" />
    <meta property="og:title" content="EduCloud - AI-Powered Educational Management System" />
    <meta property="og:description" content="Transform education with EduCloud's AI-powered platform. Manage students, teachers, exams, timetables, and reports with advanced analytics." />

    <!-- Twitter -->

    <meta property="twitter:title" content="EduCloud - AI-Powered Educational Management System" />
    <meta property="twitter:description" content="Transform education with EduCloud's AI-powered platform. Manage students, teachers, exams, timetables, and reports with advanced analytics." />
    <meta property="twitter:image" content="https://educloud.app/twitter-image.jpg" />

    <!-- Additional SEO Meta Tags -->
    <meta name="theme-color" content="#3B82F6" />
    <meta name="msapplication-TileColor" content="#3B82F6" />
    <meta name="application-name" content="EduCloud" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "EduCloud",
      "description": "AI-powered educational management system for schools and institutions",
      "url": "https://educloud.app",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "creator": {
        "@type": "Organization",
        "name": "EduCloud Team"
      },
      "featureList": [
        "Student Management",
        "Teacher Dashboard",
        "Exam Management",
        "Timetable Scheduling",
        "Report Generation",
        "AI Analytics",
        "Cloud Storage",
        "Real-time Notifications"
      ]
    }
    </script>

    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <title>EduCloud - AI-Powered Educational Management System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Performance and Analytics -->
    <script>
      // Basic performance monitoring
      if ('performance' in window && 'PerformanceObserver' in window) {
        try {
          const observer = new PerformanceObserver((list) => {
            for (const entry of list.getEntries()) {
              if (entry.entryType === 'largest-contentful-paint') {
                // Log LCP for monitoring
                console.log('LCP:', entry.startTime);
              }
            }
          });
          observer.observe({ entryTypes: ['largest-contentful-paint'] });
        } catch (e) {
          console.log('Performance monitoring not supported');
        }
      }
    </script>
  </body>
</html>
